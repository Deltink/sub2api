name: Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          test -n "${DEPLOY_SSH_KEY}"
          test -n "${DEPLOY_HOST}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync project to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          USER_NAME="${DEPLOY_USER:-ubuntu}"
          TARGET_PATH="${DEPLOY_PATH:-/home/${USER_NAME}/sub2api}"

          rsync -az --delete \
            -e "ssh -p ${PORT}" \
            --exclude '.git' \
            --exclude 'deploy/.env' \
            --exclude 'deploy/data' \
            --exclude 'deploy/postgres_data' \
            --exclude 'deploy/redis_data' \
            ./ "${USER_NAME}@${DEPLOY_HOST}:${TARGET_PATH}/"

      - name: Rebuild and restart containers
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${DEPLOY_PORT:-22}"
          USER_NAME="${DEPLOY_USER:-ubuntu}"
          TARGET_PATH="${DEPLOY_PATH:-/home/${USER_NAME}/sub2api}"

          ssh -p "${PORT}" "${USER_NAME}@${DEPLOY_HOST}" \
            "cd '${TARGET_PATH}/deploy' && sudo bash ./remote-redeploy.sh"
